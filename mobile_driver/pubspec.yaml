name: mobile_driver
description: Aplikasi Driver Rana.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  dio: ^5.3.2
  google_fonts: ^6.1.0
  intl: ^0.18.1
  url_launcher: ^6.1.11
  cached_network_image: ^3.3.0
  geolocator: ^10.1.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  qr_flutter: ^4.1.0
  socket_io_client: ^2.0.3
  flutter_local_notifications: ^17.1.2
  shared_preferences: ^2.5.3
  flutter_animate: ^4.5.0
  lottie: ^3.3.1
  share_plus: ^10.0.0
  speech_to_text: ^7.3.0
  vibration: ^2.0.1
  mobile_scanner: ^5.2.3
  camera: ^0.10.5
  flutter_compass: ^0.7.0
  sensors_plus: ^4.0.0
  fl_chart: ^0.66.2
  image_picker: ^1.0.7
  carousel_slider: ^5.1.1
  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  # WebRTC Voice Call
  flutter_webrtc: ^0.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#E07A5F"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# Splash Screen Configuration
flutter_native_splash:
  color: "#FFF8F0"
  image: "assets/splash/splash_logo.png"
  android_12:
    color: "#FFF8F0"
    icon_background_color: "#E07A5F"
    image: "assets/splash/splash_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
